# JSAI-LPR Server Configuration
# 车牌识别服务配置

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  max_request_body: 100MB

engine:
  # 默认识别模式: "auto"=按图像比例自动路由, "crop"=车牌小图识别, "full"=全图检测+识别
  mode: "auto"
  # Worker数量, 0 = 自动 (CPU核心数)
  workers: 0
  # 投递到识别 worker 队列的等待超时 (毫秒), 避免瞬时拥塞直接丢图
  submit_timeout_ms: 300

  models:
    recognizer: "models/plate_rec.onnx"
    detector: "models/plate_detect.onnx"
    color: "models/plate_color.onnx"

  onnx:
    # 每个ONNX Session的推理线程数
    threads_per_session: 1
    # 图优化级别: 0=禁用 1=基础 2=扩展 3=全部
    optimization_level: 3

  recognition:
    # 最低置信度阈值
    min_confidence: 0.6
    # 全图模式下单图最大车牌数
    max_plates: 10
    # full 模式默认最多识别的候选框数量（可被请求 options.max_plates 覆盖）
    full_max_plates: 3
    # full 模式对疑似小图执行“直识别命中即停”的阈值
    full_early_stop_conf: 0.65

  detection:
    # full 模式检测置信度阈值，越低召回越高但误检可能增加
    conf_threshold: 0.30
    # NMS IoU 阈值，越低抑制越强，越高保留更多重叠框
    iou_threshold: 0.45
    # NMS 后最多保留候选框数量（防止低阈值下候选过多拖慢识别）
    max_candidates: 50

  url:
    # 是否启用 type=url 的网络图片输入
    enabled: true
    # 单张图片下载超时 (毫秒)
    fetch_timeout_ms: 1200
    # 单张图片最大字节数，超过直接拒绝
    max_image_bytes: 5242880
    # URL 拉图并发上限 (与识别 worker 并行独立控制)
    max_fetch_concurrency: 16
    # 下载失败最大重试次数 (总尝试次数 = 1 + max_fetch_retries)
    max_fetch_retries: 2
    # 下载重试基础退避时间 (毫秒), 会按尝试次数线性递增
    retry_backoff_ms: 120
    # HTTP连接池总空闲连接数上限
    max_idle_conns: 256
    # 单Host空闲连接数上限
    max_idle_conns_per_host: 64
    # 是否阻止私网/回环/链路本地 IP，防 SSRF
    block_private_ip: true
    # 允许的 URL 协议
    allowed_schemes: ["http", "https"]

logging:
  # 日志级别: debug, info, warn, error
  level: "info"
  # 日志格式: json, text
  format: "json"
  # 输出目标: stdout 或文件路径
  output: "stdout"
