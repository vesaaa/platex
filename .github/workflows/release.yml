name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build for Linux AMD64
        run: |
          bash scripts/build.sh linux-amd64
          cd build/linux-amd64
          tar -czvf ../platex-linux-amd64.tar.gz ./*
          cd ../../

      - name: Build for Linux ARM64
        run: |
          bash scripts/build.sh linux-arm64
          cd build/linux-arm64
          tar -czvf ../platex-linux-arm64.tar.gz ./*
          cd ../../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/platex-linux-amd64.tar.gz
            build/platex-linux-arm64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
